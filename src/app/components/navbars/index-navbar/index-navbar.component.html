<!-- Navbar avec design unifié moderne -->
<nav class="top-0 fixed z-50 w-full backdrop-blur-md bg-white/95 border-b border-gray-200/50 shadow-lg">

        <i class="fas fa-bars text-gray-600"></i>
      </button>
    </div>

            <span class="nav-text">Cours</span>

        </li>

        <!-- Lien vers mes cours -->
        <li class="flex items-center">
          <a class="nav-link group" [routerLink]="['/my-courses']">

            <span class="nav-text">Mes Cours</span>
          </a>
        </li>

        <!-- Lien vers les événements -->
        <li class="flex items-center">

            <div class="nav-icon">
              <i class="fas fa-magic"></i>
            </div>
            <span class="nav-text">Recommandations</span>
          </a>
        </li>
      </ul>

        <li class="flex items-center">
          <app-index-dropdown class="block"></app-index-dropdown>
        </li>
        <li class="flex items-center">
