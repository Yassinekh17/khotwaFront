<!-- Creative Sidebar for Home Page -->
<div class="fixed left-0 top-0 h-full w-64 z-50">
  <!-- Creative Background with Multiple Layers -->
  <div class="absolute inset-0 bg-gradient-to-br from-black/90 via-red-900/90 to-gray-900/90 backdrop-blur-xl"></div>
  <div class="absolute inset-0 bg-gradient-to-t from-black/30 via-transparent to-white/10"></div>

  <!-- Creative Border Effect -->
  <div class="absolute inset-0 rounded-r-3xl border-r-2 border-gradient-to-b from-red-400/50 via-red-500/50 to-red-600/50"></div>

  <!-- Inner Glow Effect -->
  <div class="absolute inset-2 bg-gradient-to-br from-red-500/10 via-red-600/10 to-red-700/10 rounded-2xl"></div>

  <div class="relative flex flex-col h-full py-8 px-6">
    <!-- Logo/Brand with Creative Effects -->
    <div class="mb-8 text-center">
      <div class="relative">
        <div class="w-20 h-20 bg-white rounded-3xl flex items-center justify-center mx-auto mb-4 shadow-2xl transform hover:scale-110 transition-all duration-500 overflow-hidden">
          <img src="assets/img/logo.jpg" alt="TechEvents Logo" class="w-full h-full object-contain rounded-3xl">
        </div>
        <!-- Glowing ring effect -->
        <div class="absolute inset-0 w-20 h-20 bg-gradient-to-br from-red-400 to-red-600 rounded-3xl mx-auto animate-pulse opacity-30"></div>
      </div>
      <h2 class="text-white font-bold text-xl drop-shadow-lg text-center">Khotwa</h2>
      <div class="w-16 h-1 bg-gradient-to-r from-red-400 to-red-500 rounded-full mx-auto mt-2"></div>
    </div>

    <!-- Navigation Menu with Creative Design -->
    <nav class="flex-1">
      <!-- Evenements Section -->
      <div class="mb-2">
        <div class="flex items-center">
          <div class="flex-1 h-px bg-gradient-to-r from-transparent via-red-400 to-transparent"></div>
          <div class="px-3">
            <span class="text-red-300 text-xs font-bold uppercase tracking-wider">Evenements</span>
          </div>
          <div class="flex-1 h-px bg-gradient-to-r from-transparent via-red-400 to-transparent"></div>
        </div>
      </div>

      <ul class="space-y-2 mb-4">
        <!-- Découvrir les Evenements -->
        <li>
          <a
            [routerLink]="['/events']"
            class="group relative flex items-center px-4 py-3 text-white hover:text-blue-100 rounded-xl transition-all duration-300 overflow-hidden"
          >
            <!-- Background hover effect -->
            <div class="absolute inset-0 bg-gradient-to-r from-red-500/20 to-red-600/20 opacity-0 group-hover:opacity-100 transition-opacity duration-300 rounded-xl"></div>
            <!-- Border glow effect -->
            <div class="absolute inset-0 border border-red-400/30 rounded-xl opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>

            <div class="relative flex items-center w-full">
              <div class="w-8 h-8 bg-gradient-to-br from-red-500 to-red-600 rounded-lg flex items-center justify-center mr-3 group-hover:scale-110 transition-transform duration-300 shadow-lg">
                <i class="fas fa-search text-white text-sm"></i>
              </div>
              <span class="font-semibold text-sm">Découvrir les Evenements</span>
            </div>

            <!-- Arrow indicator -->
            <div class="absolute right-3 opacity-0 group-hover:opacity-100 transition-opacity duration-300">
              <i class="fas fa-chevron-right text-red-300 text-sm"></i>
            </div>
          </a>
        </li>


        <!-- Mes evenements -->
        <li>
          <a
            [routerLink]="['/my-events']"
            class="group relative flex items-center px-4 py-3 text-white hover:text-green-100 rounded-xl transition-all duration-300 overflow-hidden"
          >
            <!-- Background hover effect -->
            <div class="absolute inset-0 bg-gradient-to-r from-red-600/20 to-red-700/20 opacity-0 group-hover:opacity-100 transition-opacity duration-300 rounded-xl"></div>
            <!-- Border glow effect -->
            <div class="absolute inset-0 border border-red-500/30 rounded-xl opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>

            <div class="relative flex items-center w-full">
              <div class="w-8 h-8 bg-gradient-to-br from-red-600 to-red-700 rounded-lg flex items-center justify-center mr-3 group-hover:scale-110 transition-transform duration-300 shadow-lg">
                <i class="fas fa-calendar-check text-white text-sm"></i>
              </div>
              <span class="font-semibold text-sm">Mes evenements</span>
            </div>

            <!-- Arrow indicator -->
            <div class="absolute right-3 opacity-0 group-hover:opacity-100 transition-opacity duration-300">
              <i class="fas fa-chevron-right text-red-400 text-sm"></i>
            </div>
          </a>
        </li>

        <!-- Recommendation des evenements -->
        <li>
          <a
            [routerLink]="['/recommendations']"
            class="group relative flex items-center px-4 py-3 text-white hover:text-purple-100 rounded-xl transition-all duration-300 overflow-hidden"
          >
            <!-- Background hover effect -->
            <div class="absolute inset-0 bg-gradient-to-r from-red-700/20 to-red-800/20 opacity-0 group-hover:opacity-100 transition-opacity duration-300 rounded-xl"></div>
            <!-- Border glow effect -->
            <div class="absolute inset-0 border border-red-600/30 rounded-xl opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>

            <div class="relative flex items-center w-full">
              <div class="w-8 h-8 bg-gradient-to-br from-red-700 to-red-800 rounded-lg flex items-center justify-center mr-3 group-hover:scale-110 transition-transform duration-300 shadow-lg">
                <i class="fas fa-magic text-white text-sm"></i>
              </div>
              <span class="font-semibold text-sm">Recommendation des evenements</span>
            </div>

            <!-- Arrow indicator -->
            <div class="absolute right-3 opacity-0 group-hover:opacity-100 transition-opacity duration-300">
              <i class="fas fa-chevron-right text-red-500 text-sm"></i>
            </div>
          </a>
        </li>

      </ul>

      <!-- Cours Section -->
      <div class="mb-2">
        <div class="flex items-center">
          <div class="flex-1 h-px bg-gradient-to-r from-transparent via-blue-400 to-transparent"></div>
          <div class="px-3">
            <span class="text-blue-300 text-xs font-bold uppercase tracking-wider">Cours</span>
          </div>
          <div class="flex-1 h-px bg-gradient-to-r from-transparent via-blue-400 to-transparent"></div>
        </div>
      </div>

      <ul class="space-y-2 mb-4">
        <!-- Cours Inscrits -->
        <li>
          <a
            [routerLink]="['/cours-inscrits']"
            class="group relative flex items-center px-4 py-3 text-white hover:text-blue-100 rounded-xl transition-all duration-300 overflow-hidden"
          >
            <!-- Background hover effect -->
            <div class="absolute inset-0 bg-gradient-to-r from-blue-500/20 to-blue-600/20 opacity-0 group-hover:opacity-100 transition-opacity duration-300 rounded-xl"></div>
            <!-- Border glow effect -->
            <div class="absolute inset-0 border border-blue-400/30 rounded-xl opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>

            <div class="relative flex items-center w-full">
              <div class="w-8 h-8 bg-gradient-to-br from-blue-500 to-blue-600 rounded-lg flex items-center justify-center mr-3 group-hover:scale-110 transition-transform duration-300 shadow-lg">
                <i class="fas fa-graduation-cap text-white text-sm"></i>
              </div>
              <span class="font-semibold text-sm">Cours Inscrits</span>
            </div>

            <!-- Arrow indicator -->
            <div class="absolute right-3 opacity-0 group-hover:opacity-100 transition-opacity duration-300">
              <i class="fas fa-chevron-right text-blue-400 text-sm"></i>
            </div>
          </a>
        </li>

        <!-- Découvrir les cours -->
        <li>
          <a
            [routerLink]="['/courses']"
            class="group relative flex items-center px-4 py-3 text-white hover:text-indigo-100 rounded-xl transition-all duration-300 overflow-hidden"
          >
            <!-- Background hover effect -->
            <div class="absolute inset-0 bg-gradient-to-r from-purple-500/20 to-indigo-500/20 opacity-0 group-hover:opacity-100 transition-opacity duration-300 rounded-xl"></div>
            <!-- Border glow effect -->
            <div class="absolute inset-0 border border-purple-400/30 rounded-xl opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>

            <div class="relative flex items-center w-full">
              <div class="w-8 h-8 bg-gradient-to-br from-purple-500 to-indigo-500 rounded-lg flex items-center justify-center mr-3 group-hover:scale-110 transition-transform duration-300 shadow-lg">
                <i class="fas fa-graduation-cap text-white text-sm"></i>
              </div>
              <span class="font-semibold text-sm">Découvrir les cours</span>
            </div>

            <!-- Arrow indicator -->
            <div class="absolute right-3 opacity-0 group-hover:opacity-100 transition-opacity duration-300">
              <i class="fas fa-chevron-right text-purple-400 text-sm"></i>
            </div>
          </a>
        </li>

        <!-- Quiz Classifier -->
        <li>
          <a
            [routerLink]="['/quiz-classifier']"
            class="group relative flex items-center px-4 py-3 text-white hover:text-yellow-100 rounded-xl transition-all duration-300 overflow-hidden"
          >
            <!-- Background hover effect -->
            <div class="absolute inset-0 bg-gradient-to-r from-yellow-500/20 to-orange-500/20 opacity-0 group-hover:opacity-100 transition-opacity duration-300 rounded-xl"></div>
            <!-- Border glow effect -->
            <div class="absolute inset-0 border border-yellow-400/30 rounded-xl opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>

            <div class="relative flex items-center w-full">
              <div class="w-8 h-8 bg-gradient-to-br from-yellow-500 to-orange-500 rounded-lg flex items-center justify-center mr-3 group-hover:scale-110 transition-transform duration-300 shadow-lg">
                <i class="fas fa-brain text-white text-sm"></i>
              </div>
              <span class="font-semibold text-sm">Quiz Classifier</span>
            </div>

            <!-- Arrow indicator -->
            <div class="absolute right-3 opacity-0 group-hover:opacity-100 transition-opacity duration-300">
              <i class="fas fa-chevron-right text-yellow-400 text-sm"></i>
            </div>
          </a>
        </li>
      </ul>

      <!-- Admin Section Separator -->
      <div class="my-4">
        <div class="flex items-center">
          <div class="flex-1 h-px bg-gradient-to-r from-transparent via-slate-600 to-transparent"></div>
          <div class="px-3">
            <span class="text-slate-400 text-xs font-bold uppercase tracking-wider">Côté Admin</span>
          </div>
          <div class="flex-1 h-px bg-gradient-to-r from-transparent via-slate-600 to-transparent"></div>
        </div>
      </div>

      <!-- Admin Navigation - Only Event Management -->
      <div class="space-y-2">
        <div class="mb-4">
          <ul class="space-y-1">
            <li>
              <a
                [routerLink]="['/admin/listevent']"
                class="group relative flex items-center px-4 py-3 text-slate-300 hover:text-orange-100 rounded-xl transition-all duration-300 overflow-hidden"
              >
                <div class="absolute inset-0 bg-gradient-to-r from-red-800/20 to-red-900/20 opacity-0 group-hover:opacity-100 transition-opacity duration-300 rounded-xl"></div>
                <div class="absolute inset-0 border border-red-700/30 rounded-xl opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
                <div class="relative flex items-center w-full">
                  <div class="w-10 h-10 bg-gradient-to-br from-red-800 to-red-900 rounded-xl flex items-center justify-center mr-3 group-hover:scale-110 transition-transform duration-300 shadow-lg">
                    <i class="fas fa-calendar-alt text-white text-lg"></i>
                  </div>
                  <span class="font-semibold text-base">Gestion Événements</span>
                </div>
                <div class="absolute right-4 opacity-0 group-hover:opacity-100 transition-opacity duration-300">
                  <i class="fas fa-chevron-right text-red-600"></i>
                </div>
              </a>
            </li>
            <li>
              <a
                [routerLink]="['/admin/listcourse']"
                class="group relative flex items-center px-4 py-3 text-slate-300 hover:text-purple-100 rounded-xl transition-all duration-300 overflow-hidden"
              >
                <div class="absolute inset-0 bg-gradient-to-r from-purple-800/20 to-purple-900/20 opacity-0 group-hover:opacity-100 transition-opacity duration-300 rounded-xl"></div>
                <div class="absolute inset-0 border border-purple-700/30 rounded-xl opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
                <div class="relative flex items-center w-full">
                  <div class="w-10 h-10 bg-gradient-to-br from-purple-800 to-purple-900 rounded-xl flex items-center justify-center mr-3 group-hover:scale-110 transition-transform duration-300 shadow-lg">
                    <i class="fas fa-graduation-cap text-white text-lg"></i>
                  </div>
                  <span class="font-semibold text-base">Gestion Cours</span>
                </div>
                <div class="absolute right-4 opacity-0 group-hover:opacity-100 transition-opacity duration-300">
                  <i class="fas fa-chevron-right text-purple-600"></i>
                </div>
              </a>
            </li>

          </ul>
        </div>
      </div>
    </nav>

    <!-- Creative Footer -->
    <div class="mt-auto text-center">
      <div class="inline-flex items-center px-4 py-2 bg-gradient-to-r from-slate-800/50 to-slate-700/50 rounded-full border border-slate-600/30 backdrop-blur-sm">
        <i class="fas fa-copyright text-slate-400 mr-2"></i>
        <p class="text-slate-300 text-sm font-medium">2024 Khotwa</p>
      </div>
    </div>
  </div>
</div>
