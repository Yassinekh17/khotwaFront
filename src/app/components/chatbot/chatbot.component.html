<!-- Chatbot Toggle Button -->
<div class="fixed bottom-4 right-4 z-50">
  <button
    (click)="toggleChat()"
    class="bg-red-500 hover:bg-red-600 text-white rounded-full w-16 h-16 flex items-center justify-center shadow-lg transition-all duration-300 border-4 border-white"
    [class.rotate-180]="isOpen"
  >
    <i class="fas fa-comments text-2xl"></i>
  </button>
</div>

<!-- Chat Window -->
<div
  *ngIf="isOpen"
  class="fixed bottom-20 right-4 w-80 h-96 bg-white rounded-lg shadow-2xl z-40 flex flex-col border border-gray-200"
>
  <!-- Chat Header -->
  <div class="bg-blue-500 text-white p-4 rounded-t-lg flex items-center justify-between">
    <div class="flex items-center">
      <i class="fas fa-robot mr-2"></i>
      <span class="font-semibold">Assistant Événement</span>
    </div>
    <button
      (click)="toggleChat()"
      class="text-white hover:text-gray-200 transition-colors"
    >
      <i class="fas fa-times"></i>
    </button>
  </div>

  <!-- Chat Messages -->
  <div class="flex-1 p-4 overflow-y-auto bg-gray-50">
    <div *ngFor="let message of messages" class="mb-3">
      <div
        [class]="message.isUser ? 'flex justify-end' : 'flex justify-start'"
      >
        <div
          [class]="message.isUser
            ? 'bg-blue-500 text-white rounded-lg px-3 py-2 max-w-xs'
            : 'bg-white text-gray-800 rounded-lg px-3 py-2 max-w-xs shadow-sm border'"
        >
          <p class="text-sm whitespace-pre-line">{{ message.text }}</p>
          <span class="text-xs opacity-70 mt-1 block">
            {{ message.timestamp | date:'HH:mm' }}
          </span>
        </div>
      </div>
    </div>

    <!-- Typing Indicator -->
    <div *ngIf="isTyping" class="flex justify-start mb-3">
      <div class="bg-white text-gray-800 rounded-lg px-3 py-2 shadow-sm border">
        <div class="flex items-center">
          <div class="flex space-x-1">
            <div class="w-2 h-2 bg-gray-400 rounded-full animate-bounce"></div>
            <div class="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 0.1s"></div>
            <div class="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 0.2s"></div>
          </div>
          <span class="text-xs text-gray-500 ml-2">Assistant écrit...</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Chat Input -->
  <div class="p-4 border-t border-gray-200 bg-white rounded-b-lg">
    <div class="flex items-center space-x-2">
      <input
        type="text"
        [(ngModel)]="userInput"
        (keypress)="onKeyPress($event)"
        placeholder="Posez votre question..."
        class="flex-1 px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
      />
      <button
        (click)="sendMessage()"
        [disabled]="!userInput.trim()"
        class="bg-blue-500 hover:bg-blue-600 disabled:bg-gray-300 disabled:cursor-not-allowed text-white px-4 py-2 rounded-lg transition-colors"
      >
        <i class="fas fa-paper-plane"></i>
      </button>
    </div>
  </div>
</div>
