<app-sidebar></app-sidebar>

<!-- Page d'accueil simple et élégante -->
<div class="ml-64 min-h-screen flex items-center justify-center bg-gradient-to-br from-gray-50 to-white">
  <div class="text-center space-y-12 px-8 max-w-4xl">

    <!-- Logo Section -->
    <div class="space-y-6">
      <div class="w-32 h-32 bg-white rounded-2xl flex items-center justify-center mx-auto shadow-xl border border-gray-200">
        <img src="assets/img/logo.jpg" alt="Khotwa Logo" class="w-24 h-24 object-contain rounded-xl">
      </div>

      <div class="space-y-4">
        <h1 class="text-5xl md:text-6xl font-bold text-gray-800">Khotwa</h1>
        <p class="text-xl text-gray-600 max-w-2xl mx-auto leading-relaxed">
          Découvrez et participez aux événements technologiques les plus innovants de Tunisie
        </p>
      </div>
    </div>

    <!-- Action Buttons -->
    <div class="flex flex-col sm:flex-row gap-6 justify-center">
      <a
        [routerLink]="['/events']"
        class="inline-flex items-center justify-center px-8 py-4 bg-red-600 hover:bg-red-700 text-white font-semibold text-lg rounded-xl shadow-lg hover:shadow-xl transform hover:-translate-y-1 transition-all duration-300"
      >
        <i class="fas fa-search mr-3"></i>
        Découvrir les événements
      </a>

      <a
        [routerLink]="['/my-events']"
        class="inline-flex items-center justify-center px-8 py-4 bg-white hover:bg-gray-50 text-gray-800 font-semibold text-lg rounded-xl shadow-lg hover:shadow-xl transform hover:-translate-y-1 transition-all duration-300 border border-gray-200"
      >
        <i class="fas fa-calendar-check mr-3"></i>
        Mes événements
      </a>
    </div>

    <!-- Features -->
    <div class="grid md:grid-cols-3 gap-8 mt-16">
      <div class="bg-white rounded-xl p-6 shadow-lg border border-gray-100">
        <div class="w-12 h-12 bg-red-100 rounded-lg flex items-center justify-center mx-auto mb-4">
          <i class="fas fa-users text-red-600"></i>
        </div>
        <h3 class="text-lg font-semibold text-gray-800 mb-2">Communauté</h3>
        <p class="text-gray-600 text-sm">Rejoignez des milliers de professionnels</p>
      </div>

      <div class="bg-white rounded-xl p-6 shadow-lg border border-gray-100">
        <div class="w-12 h-12 bg-blue-100 rounded-lg flex items-center justify-center mx-auto mb-4">
          <i class="fas fa-lightbulb text-blue-600"></i>
        </div>
        <h3 class="text-lg font-semibold text-gray-800 mb-2">Innovation</h3>
        <p class="text-gray-600 text-sm">Découvrez les dernières tendances</p>
      </div>

      <div class="bg-white rounded-xl p-6 shadow-lg border border-gray-100">
        <div class="w-12 h-12 bg-green-100 rounded-lg flex items-center justify-center mx-auto mb-4">
          <i class="fas fa-handshake text-green-600"></i>
        </div>
        <h3 class="text-lg font-semibold text-gray-800 mb-2">Networking</h3>
        <p class="text-gray-600 text-sm">Établissez des connexions durables</p>
      </div>
    </div>
  </div>
</div>
